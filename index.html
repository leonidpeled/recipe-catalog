<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>קטלוג מתכונים – על השולחן</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fdf6ee; --warm: #f5e6cf; --rust: #b5451b; --rust-light: #e8c9a0;
      --brown: #5c3317; --text: #2d1f14; --muted: #9a7f6a;
      --card: #fff; --shadow: 0 2px 12px rgba(90,40,10,0.08);
      --font-main: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif;
      --font-title: Georgia, 'Times New Roman', serif;
    }
    body { font-family: var(--font-main); background: var(--cream); color: var(--text); min-height: 100vh; }

    header { background: var(--brown); color: var(--cream); padding: 24px 20px 18px; text-align: center; }
    header h1 { font-family: var(--font-title); font-size: 2.2rem; font-weight: bold; letter-spacing: -0.5px; }
    header p { font-size: 0.88rem; color: var(--rust-light); margin-top: 4px; }

    .search-section { background: var(--rust); padding: 18px 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .search-wrap { display: flex; gap: 10px; width: 100%; max-width: 580px; }
    #search-input { flex: 1; padding: 12px 16px; font-size: 1rem; font-family: var(--font-main); border: none; border-radius: 9px; background: #fff; outline: none; direction: rtl; color: var(--text); }
    #search-input::placeholder { color: var(--muted); }
    #search-btn { padding: 12px 22px; background: var(--brown); color: #fff; border: none; border-radius: 9px; font-size: 0.95rem; font-family: var(--font-main); cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    #search-btn:hover { background: #3d2010; }
    .search-hint { font-size: 0.76rem; color: rgba(255,255,255,0.5); max-width: 580px; width: 100%; }

    .controls { max-width: 860px; margin: 20px auto 0; padding: 0 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }
    .controls-right { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn { padding: 7px 15px; border-radius: 8px; border: 1.5px solid var(--rust-light); background: #fff; color: var(--brown); font-family: var(--font-main); font-size: 0.87rem; cursor: pointer; transition: all 0.15s; }
    .btn:hover { border-color: var(--rust); color: var(--rust); }
    .btn.active { background: var(--rust); border-color: var(--rust); color: #fff; }
    .sort-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.87rem; color: var(--muted); }
    select { padding: 6px 11px; border-radius: 8px; border: 1.5px solid var(--rust-light); background: #fff; font-family: var(--font-main); font-size: 0.87rem; color: var(--brown); cursor: pointer; outline: none; }

    .issue-filter { max-width: 860px; margin: 10px auto 0; padding: 0 16px; display: none; flex-wrap: wrap; gap: 6px; }
    .issue-filter.visible { display: flex; }
    .issue-btn { padding: 5px 13px; border-radius: 20px; border: 1.5px solid var(--rust-light); background: #fff; color: var(--brown); font-family: var(--font-main); font-size: 0.81rem; cursor: pointer; transition: all 0.15s; }
    .issue-btn:hover { border-color: var(--rust); }
    .issue-btn.active { background: var(--rust); border-color: var(--rust); color: #fff; }

    #results { max-width: 860px; margin: 18px auto 40px; padding: 0 16px; }
    .count { font-size: 0.83rem; color: var(--muted); margin-bottom: 12px; }

    /* טבלה וירטואלית – רק 40 שורות ברגע נתון */
    .table-wrap {
      background: var(--card);
      border-radius: 13px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .table-head {
      display: grid;
      grid-template-columns: 1fr 90px 80px;
      background: var(--brown);
      color: var(--cream);
      padding: 11px 18px;
      font-family: var(--font-title);
      font-size: 0.93rem;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .virtual-scroll {
      height: 520px;
      overflow-y: auto;
      position: relative;
    }
    .virtual-inner { position: relative; }
    .virtual-visible { position: absolute; top: 0; left: 0; right: 0; }
    .table-row {
      display: grid;
      grid-template-columns: 1fr 90px 80px;
      padding: 9px 18px;
      border-bottom: 1px solid #f0e8dc;
      align-items: center;
      font-size: 0.91rem;
      transition: background 0.1s;
    }
    .table-row:hover { background: #fdf0e4; }
    .row-name { font-weight: 500; }
    .badge-issue { display: inline-block; background: var(--rust); color: #fff; padding: 2px 9px; border-radius: 20px; font-size: 0.76rem; }
    .badge-page { display: inline-block; background: var(--warm); color: var(--brown); padding: 2px 9px; border-radius: 20px; font-size: 0.76rem; }

    .group-block { margin-bottom: 20px; background: var(--card); border-radius: 13px; overflow: hidden; box-shadow: var(--shadow); }
    .group-header { background: var(--brown); color: var(--cream); padding: 11px 18px; font-family: var(--font-title); font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: space-between; }
    .group-header span { font-size: 0.78rem; color: var(--rust-light); font-family: var(--font-main); }
    .group-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 18px; border-bottom: 1px solid #f0e8dc; transition: background 0.1s; font-size: 0.91rem; }
    .group-row:last-child { border-bottom: none; }
    .group-row:hover { background: #fdf0e4; }

    .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 1rem; line-height: 2; }
    mark { background: #ffe0b2; color: var(--brown); border-radius: 2px; padding: 0 1px; }

    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 0.95rem; }
  </style>
</head>
<body>

<header>
  <h1>📖 קטלוג מתכונים</h1>
  <p>גיליונות "על השולחן"</p>
</header>

<div class="search-section">
  <div class="search-wrap">
    <input id="search-input" type="text" placeholder='חפש: "עוף לימון", "שנישל", "קציצה"...' autocomplete="off" />
    <button id="search-btn">חיפוש</button>
  </div>
  <div class="search-hint">החיפוש חכם – מתעלם משגיאות כתיב, יחיד/רבים, זכר/נקבה</div>
</div>

<div class="controls">
  <div class="controls-right">
    <button class="btn active" id="btn-all">כל המתכונים</button>
    <button class="btn" id="btn-by-issue">לפי גיליון</button>
  </div>
  <div class="sort-wrap">
    <span>מיון:</span>
    <select id="sort-select">
      <option value="abc">א׳–ב׳</option>
      <option value="issue">גיליון ועמוד</option>
    </select>
  </div>
</div>

<div class="issue-filter" id="issue-filter"></div>
<div id="results"><div class="loading">טוען מתכונים...</div></div>

<script>
  const ROW_H = 40;
  const VISIBLE_ROWS = 40;

  let recipes = [], fuse = null;
  let mode = 'all', selectedIssue = null, sortBy = 'abc';
  let currentList = [];

  // ===== נורמליזציה =====
  function stemHebrew(w) {
    if (w.length <= 2) return w;
    w = w.replace(/^(ו|ב|כ|ל|מ|ש|ה|מה|שה|וה|לה|בה|כש|לכש)/, '');
    if (w.length <= 2) return w;
    for (const s of ['יות','יים','ות','ים','ית','נו','כם','הם','ה','י','ך','ן']) {
      if (w.endsWith(s) && w.length - s.length >= 2) return w.slice(0, w.length - s.length);
    }
    return w;
  }
  function norm(str) {
    if (!str) return '';
    return str.trim().toLowerCase()
      .replace(/[\u0591-\u05C7]/g, '').replace(/[־\-–]/g, ' ')
      .split(/\s+/).filter(Boolean).map(stemHebrew).join(' ');
  }

  function buildIndex(data) {
    const enriched = data.map(r => ({ ...r, _n: norm(r.name), _w: norm(r.name).split(' ').filter(w=>w.length>1) }));
    fuse = new Fuse(enriched, {
      keys: [{ name:'_n', weight:2 }, { name:'name', weight:1.5 }, { name:'_w', weight:1 }],
      threshold: 0.42, minMatchCharLength: 2, includeScore: true, shouldSort: true, ignoreLocation: true
    });
    return enriched;
  }

  function smartSearch(query) {
    if (!query.trim()) return [];
    const nq = norm(query);
    const words = nq.split(' ').filter(w=>w.length>1);
    if (words.length === 1) return fuse.search(nq).map(r=>r.item);
    // AND חיפוש – כל המילים חייבות להופיע
    return recipes.filter(r => {
      const name = r._n;
      return words.every(word => {
        if (name.includes(word)) return true;
        return fuse.search(word).some(res => res.item.name === r.name && (res.score||1) < 0.45);
      });
    });
  }

  function highlight(text, query) {
    if (!query) return text;
    let result = text;
    for (const w of query.trim().split(/\s+/).filter(w=>w.length>1)) {
      try { result = result.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`); } catch(e){}
    }
    return result;
  }

  function getSorted(list) {
    if (sortBy==='abc') return [...list].sort((a,b)=>a.name.localeCompare(b.name,'he'));
    return [...list].sort((a,b)=>{
      const ai=parseInt(a.issue), bi=parseInt(b.issue);
      return ai!==bi ? ai-bi : parseInt(a.page)-parseInt(b.page);
    });
  }

  // ===== Virtual Scroll =====
  function renderVirtual(list, countText, query='') {
    currentList = list;
    const div = document.getElementById('results');
    if (!list.length) {
      div.innerHTML = `<div class="empty">לא נמצאו מתכונים 🙁<br><small>נסה מילה אחרת</small></div>`;
      return;
    }
    div.innerHTML = `
      <p class="count">${countText}</p>
      <div class="table-wrap">
        <div class="table-head">
          <span>שם המתכון</span><span>גיליון</span><span>עמוד</span>
        </div>
        <div class="virtual-scroll" id="vs">
          <div class="virtual-inner" id="vi" style="height:${list.length*ROW_H}px">
            <div class="virtual-visible" id="vv"></div>
          </div>
        </div>
      </div>`;
    const vs = document.getElementById('vs');
    function paint() {
      const start = Math.max(0, Math.floor(vs.scrollTop/ROW_H) - 5);
      const end = Math.min(list.length, start + VISIBLE_ROWS + 10);
      document.getElementById('vv').style.top = start*ROW_H + 'px';
      document.getElementById('vv').innerHTML = list.slice(start,end).map(r=>`
        <div class="table-row">
          <div class="row-name">${query ? highlight(r.name,query) : r.name}</div>
          <div><span class="badge-issue">${r.issue}</span></div>
          <div><span class="badge-page">עמ׳ ${r.page}</span></div>
        </div>`).join('');
    }
    paint();
    vs.addEventListener('scroll', paint, {passive:true});
  }

  function renderGrouped() {
    const div = document.getElementById('results');
    const issues = [...new Set(recipes.map(r=>r.issue))].sort((a,b)=>parseInt(a)-parseInt(b));
    let html = `<p class="count">סה"כ ${recipes.length} מתכונים ב-${issues.length} גיליונות</p>`;
    for (const iss of issues) {
      const group = getSorted(recipes.filter(r=>r.issue===iss));
      html += `<div class="group-block">
        <div class="group-header">גיליון ${iss}<span>${group.length} מתכונים</span></div>
        ${group.map(r=>`<div class="group-row"><span>${r.name}</span><span class="badge-page">עמ׳ ${r.page}</span></div>`).join('')}
      </div>`;
    }
    div.innerHTML = html;
  }

  function buildIssueButtons() {
    const issues = [...new Set(recipes.map(r=>r.issue))].sort((a,b)=>parseInt(a)-parseInt(b));
    document.getElementById('issue-filter').innerHTML = issues.map(iss=>
      `<button class="issue-btn" data-issue="${iss}" onclick="selectIssue('${iss}')">גיליון ${iss}</button>`
    ).join('');
  }

  function selectIssue(iss) {
    selectedIssue = iss;
    document.querySelectorAll('.issue-btn').forEach(b=>b.classList.toggle('active', b.dataset.issue===iss));
    render();
  }

  function render() {
    const query = document.getElementById('search-input').value.trim();
    if (query) {
      const list = smartSearch(query);
      renderVirtual(list, `נמצאו ${list.length} תוצאות עבור "${query}"`, query);
      return;
    }
    if (mode==='all') {
      renderVirtual(getSorted(recipes), `סה"כ ${recipes.length} מתכונים`);
    } else {
      if (selectedIssue) {
        const list = getSorted(recipes.filter(r=>r.issue===selectedIssue));
        renderVirtual(list, `${list.length} מתכונים בגיליון ${selectedIssue}`);
      } else {
        renderGrouped();
      }
    }
  }

  // טעינה עם cache
  const CACHE_KEY = 'recipes_cache';
  const CACHE_VER = 'v1';
  async function loadRecipes() {
    try {
      const cached = sessionStorage.getItem(CACHE_KEY);
      if (cached) {
        const {ver, data} = JSON.parse(cached);
        if (ver === CACHE_VER) { return data; }
      }
    } catch(e){}
    const res = await fetch('recipes.json?v=' + CACHE_VER);
    const data = await res.json();
    try { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ver:CACHE_VER, data})); } catch(e){}
    return data;
  }

  loadRecipes().then(data => {
    recipes = buildIndex(data);
    buildIssueButtons();
    render();
  });

  document.getElementById('btn-all').addEventListener('click', () => {
    mode='all'; selectedIssue=null;
    document.getElementById('btn-all').classList.add('active');
    document.getElementById('btn-by-issue').classList.remove('active');
    document.getElementById('issue-filter').classList.remove('visible');
    document.getElementById('search-input').value='';
    render();
  });
  document.getElementById('btn-by-issue').addEventListener('click', () => {
    mode='issue'; selectedIssue=null;
    document.getElementById('btn-by-issue').classList.add('active');
    document.getElementById('btn-all').classList.remove('active');
    document.getElementById('issue-filter').classList.add('visible');
    document.querySelectorAll('.issue-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('search-input').value='';
    render();
  });
  document.getElementById('sort-select').addEventListener('change', e => { sortBy=e.target.value; render(); });
  document.getElementById('search-btn').addEventListener('click', render);
  document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') render(); });
  let t;
  document.getElementById('search-input').addEventListener('input', () => { clearTimeout(t); t=setTimeout(render,250); });
</script>
</body>
</html>
